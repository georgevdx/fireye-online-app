<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fireye Online Fire Safety App</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#b71c1c">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <div class="app">
    <header class="header brand-header">
  <div class="brand-mark">🔥</div>
  <div>
    <h1>Fireye</h1>
    <p class="subtitle">Fire Safety App</p>
  </div>
</header>
<div class="card cloud-sync-card">
  <h2>Cloud Sync</h2>

  <div id="cloudConnectedView" style="display:none;">
    <div class="sync-connected">✅ Cloud Sync: Connected</div>
    <button id="showSyncToolsBtn" type="button">Admin / Sync Tools</button>
  </div>

  <div id="syncTools">
    <input id="loginEmail" type="email" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">

    <div class="cloud-sync-actions">
      <button id="loginBtn" type="button">Login</button>
      <button id="signupBtn" type="button">Sign Up</button>
    </div>

    <button id="syncUploadBtn" type="button">Upload Sync</button>
    <button id="syncDownloadBtn" type="button">Download Sync</button>
    <button id="syncMergeBtn" type="button">Merge Sync</button>
  </div>

  <div id="syncStatus" class="note"></div>
</div>

  <div id="backupTools" class="backup-actions">
  <button id="exportBackupBtn" type="button">Export Backup</button>

  <label class="backup-import-btn">
    Import Backup
    <input id="importBackupInput" type="file" accept=".json" style="display:none;">
  </label>
</div>
    <section id="projectListSection" class="card">
      <div class="toolbar">
        <h2>Projects</h2>
        <button id="newProjectBtn" type="button">New Project</button>
      </div>
      
      <div id="dashboardMetrics" class="dashboard-metrics"></div>

      <div class="filter-bar">
        <button onclick="setFilter('all')">All</button>
        <button onclick="setFilter('soon')">Due Soon</button>
        <button onclick="setFilter('overdue')">Overdue</button>
        <button onclick="setFilter('none')">No Follow-up</button>
      </div>
      <input
        id="projectSearch"
        type="text"
        placeholder="Search by place name, address, mall/centre, or unit"
        style="margin:12px 0; width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;"
      >
      <div id="reminderBanner" class="reminder-banner" style="display:none;"></div>
      <div id="dashboardSummary" class="dashboard-summary"></div>
      <div id="projectsList"></div>
    </section>

    <section id="projectFormSection" style="display:none;">
      <section class="card">
        <div class="toolbar">
          <h2>Project Details</h2>
          <button id="backBtn" type="button">Back to Projects</button>
        </div>

        <div class="form-grid">

  <div class="form-row">
    <label for="projectName">Place Name</label>
    <input id="projectName" type="text" placeholder="Enter place name">
  </div>

  <div class="form-row">
    <label for="organisationName">Organisation / Company</label>
    <input id="organisationName" type="text" placeholder="Enter company name">
  </div>

  <div class="form-row">
    <label for="siteName">Site Name</label>
    <input id="siteName" type="text" placeholder="Enter site name">
  </div>

  <div class="form-row">
    <label for="projectAddress">Address</label>
    <input id="streetNumber" placeholder="Street number">

<input id="projectAddress" placeholder="Street, Suburb, City">
  </div>

  <div class="form-row">
    <label for="gps">GPS Reference</label>
    <div class="field-stack">
      <input id="gps" type="text" placeholder="-25.7479, 28.2293">
      <button id="useLocationBtn" type="button">Use Current Location</button>
    </div>
  </div>

  <div class="form-row">
    <label for="inMall">In Mall/Centre?</label>
    <select id="inMall">
      <option value="No">No</option>
      <option value="Yes">Yes</option>
    </select>
  </div>

  <div id="mallFields" style="display:none;">
    <div class="form-row">
      <label for="mallName">Mall/Centre Name</label>
      <input id="mallName" type="text">
    </div>

    <div class="form-row">
      <label for="unitNumber">Unit / Shop Number</label>
      <input id="unitNumber" type="text">
    </div>
  </div>
  <div class="form-section">
    <h3>Responsible Contact</h3>

    <label>Contact Person</label>
    <input id="contactPerson" type="text" placeholder="Contact person name">

    <label>Telephone Number</label>
    <input id="contactTel" type="tel" placeholder="Contact telephone number">

    <label>Email Address</label>
    <input id="contactEmail" type="email" placeholder="Contact email address">
  </div>
  <div class="form-row">
    <label for="productType">Product Type</label>
    <select id="productType">
      <option value="Fire Safety Officer">Fire Safety Officer</option>
      <option value="Commercial">Commercial</option>
      <option value="Industrial">Industrial</option>
      <option value="Retail">Retail</option>
      <option value="Hospitality">Hospitality</option>
    </select>
  </div>

  <div class="form-row">
    <label for="inspectionType">Inspection Type</label>
    <select id="inspectionType">
      <option value="General Fire Inspection">General Fire Inspection</option>
      <option value="Compliance Inspection">Compliance Inspection</option>
      <option value="Occupancy Inspection">Occupancy Inspection</option>
      <option value="Means of Escape Inspection">Means of Escape Inspection</option>
    </select>
  </div>

  <div class="form-row">
    <label for="inspectorName">Inspector Name</label>
    <input id="inspectorName" type="text">
  </div>

  <div class="form-row">
    <label for="occupancySelect">Select Occupancy</label>
    <select id="occupancySelect"></select>
  </div>

</div>
        <div class="button-row">
          <button id="saveBtn" type="button">Save Project</button>
          <button id="reportBtn" type="button">Generate Report</button>
          <button id="exportBtn" type="button">Export PDF</button>
          <button id="shareBtn" type="button">Share Report</button>
          <button id="followUpBtn" type="button">Create Follow-up</button>
          <button id="deleteBtn" type="button" class="secondary-btn">Delete Project</button>
        </div>

        <div id="saveMessage" class="note" style="margin-top: 10px;"></div>
      </section>

      <div class="card" id="requirementsSection">
        <h2>Requirements</h2>
        <div id="requirements"></div>

      </div>

      <section class="card">
  <h2>Checklist</h2>
  <div id="checklist"></div>
  </section>

  <section class="card">
  <h2>Photo Evidence</h2>
  <input type="file" id="photoInput" accept="image/*" capture="environment">
  <div id="photoPreview"></div>
  <div class="form-section">
  <h3>Inspector Comments / Conclusion</h3>
  <textarea 
    id="finalComments" 
    placeholder="Enter inspection findings, conclusions, and recommendations..."
    style="width: 100%; min-height: 120px; margin-top: 8px;"
  ></textarea>
</div>
  </section>

<div class="form-section">
  <h3>Follow-up / Re-Inspection</h3>

  <label>Follow-up Required?</label>
  <select id="followUpRequired">
    <option value="No">No</option>
    <option value="Yes">Yes</option>
  </select>

  <label>Follow-up Date</label>
  <input type="date" id="followUpDate">

  <label>Follow-up Notes</label>
  <textarea id="followUpNotes" placeholder="Reason for follow-up..."></textarea>
</div>

    <section class="card" id="reportSection" style="display:none;">
      <h2>Inspection Report</h2>
      <div id="reportContent"></div>
      </section>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/fireye-online-app/service-worker.js')
          .then(reg => console.log('Service worker registered', reg))
          .catch(err => console.log('Service worker not registered', err));
      });
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>
</html>
