<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fireye Online Fire Safety App</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#b71c1c">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header brand-header">
  <div class="brand-mark">🔥</div>
  <div>
    <h1>Fireye</h1>
    <p class="subtitle">Fire Safety App</p>
  </div>
</header>

    <section id="projectListSection" class="card">
      <div class="toolbar">
        <h2>Projects</h2>
        <button id="newProjectBtn" type="button">New Project</button>
      </div>
      <input
        id="projectSearch"
        type="text"
        placeholder="Search by place name, address, mall/centre, or unit"
        style="margin:12px 0; width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;"
      >
      <div id="projectsList"></div>
    </section>

    <section id="projectFormSection" style="display:none;">
      <section class="card">
        <div class="toolbar">
          <h2>Project Details</h2>
          <button id="backBtn" type="button">Back to Projects</button>
        </div>

        <label for="projectName">Place Name</label>
        <input id="projectName" type="text" placeholder="Enter place name">

        <label for="projectAddress" style="margin-top:12px;">Address</label>
        <input id="projectAddress" type="text" placeholder="Enter address">

        <label for="gps" style="margin-top:12px;">GPS Reference</label>
        <input id="gps" type="text" placeholder="-25.7479, 28.2293">

        <button id="useLocationBtn" type="button" style="margin-top:12px;">Use Current Location</button>

        <label for="inMall" style="margin-top:12px;">In Mall/Centre?</label>
        <select id="inMall">
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>

        <div id="mallFields" style="display:none;">
          <label for="mallName" style="margin-top:12px;">Mall/Centre Name</label>
          <input id="mallName" type="text" placeholder="Enter mall/centre name">

          <label for="unitNumber" style="margin-top:12px;">Unit / Shop Number</label>
          <input id="unitNumber" type="text" placeholder="e.g. Shop 12">
        </div>

          <label for="productType" style="margin-top:12px;">Product Type</label>
        <select id="productType">
          <option value="Fire Safety Officer">Fire Safety Officer</option>
          <option value="Commercial">Commercial</option>
          <option value="Industrial">Industrial</option>
          <option value="Retail">Retail</option>
          <option value="Hospitality">Hospitality</option>
        </select>

        <label for="inspectionType" style="margin-top:12px;">Inspection Type</label>
        <select id="inspectionType">
          <option value="General Fire Inspection">General Fire Inspection</option>
          <option value="Compliance Inspection">Compliance Inspection</option>
          <option value="Occupancy Inspection">Occupancy Inspection</option>
          <option value="Means of Escape Inspection">Means of Escape Inspection</option>
        </select>
        
        <label for="inspectorName" style="margin-top: 12px;">Inspector Name</label>
        <input id="inspectorName" type="text" placeholder="Enter inspector name">

        <label for="occupancySelect" style="margin-top: 12px;">Select Occupancy</label>
        <select id="occupancySelect"></select>

        <div class="button-row">
          <button id="saveBtn" type="button">Save Project</button>
          <button id="reportBtn" type="button">Generate Report</button>
          <button id="exportBtn" type="button">Export PDF</button>
          <button id="shareBtn" type="button">Share Report</button>
          <button id="deleteBtn" type="button" class="secondary-btn">Delete Project</button>
        </div>

        <div id="saveMessage" class="note" style="margin-top: 10px;"></div>
      </section>

      <section class="card">
        <h2>Requirements</h2>
        <div id="requirements"></div>
      </section>

      <section class="card">
  <h2>Checklist</h2>
  <div id="checklist"></div>
  </section>

  <section class="card">
  <h2>Photo Evidence</h2>
  <input type="file" id="photoInput" accept="image/*" capture="environment">
  <div id="photoPreview"></div>
  </section>

    <section class="card" id="reportSection" style="display:none;">
      <h2>Inspection Report</h2>
      <div id="reportContent"></div>
      </section>
    </section>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/fireye-online-app/service-worker.js')
          .then(reg => console.log('Service worker registered', reg))
          .catch(err => console.log('Service worker not registered', err));
      });
    }
  </script>
</body>
</html>
