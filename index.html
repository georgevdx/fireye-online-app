<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fireye Online Fire Safety App</title>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#b71c1c">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>🔥 Fireye Online Fire Safety App</h1>
      <p class="subtitle">Basic fire safety lookup and checklist</p>
    </header>

    <section class="card">
      <label for="occupancySelect">Select Occupancy</label>
      <select id="occupancySelect"></select>
    </section>

    <section class="card">
      <h2>Requirements</h2>
      <div id="requirements"></div>
    </section>

    <section class="card">
      <h2>Checklist</h2>
      <div id="checklist"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
